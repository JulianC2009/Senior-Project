<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Senior Project Chatbot</title>

  <style>
    /* Body styling */
    body 
    {
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #e8f1f8, #f6fbff);
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    /* Main Chat container */
    .chat-container 
    {
      width: 90%;
      max-width: 760px;
      height: 88vh;
      background: white;
      border-radius: 15px;
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.15);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    .chat-header 
    {
      background: #4e94e4;
      color: white;
      padding: 15px;
      font-size: 20px;
      font-weight: bold;
      text-align: center;
    }

    /* Session user bar */
    .session-bar
    {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 12px;
      border-bottom: 1px solid #e6e6e6;
      background: #f7fbff;
      font-size: 14px;
    }

    .session-info
    {
      color: #333;
      font-weight: bold;
    }

    .logout-btn
    {
      width: auto;
      padding: 8px 12px;
      background: #d9534f;
      color: white;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
    }

    .logout-btn:hover
    {
      background: #c23f3a;
    }

    /* Chat controls */
    .chat-controls 
    {
      display: flex;
      gap: 10px;
      align-items: center;
      padding: 10px 12px;
      border-bottom: 1px solid #e6e6e6;
      background: #ffffff;
      font-size: 14px;
      flex-wrap: wrap;
    }

    .chat-controls label 
    {
      color: #333;
      font-weight: bold;
    }

    .chat-controls select 
    {
      padding: 6px 10px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 14px;
      background: #fff;
    }

    .chat-controls .checkbox 
    {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      user-select: none;
    }

    /* Chat box */
    #chatBox 
    {
      flex: 1;
      padding: 15px;
      overflow-y: auto;
      background: #f7fbff;
    }

    /* Message styling */
    .message 
    {
      margin: 8px 0;
      padding: 10px 14px;
      border-radius: 18px;
      max-width: 75%;
      width: fit-content;
      white-space: pre-wrap;
      word-wrap: break-word;
      font-size: 15px;
    }

    /* User vs Bot message styling */
    .user 
    {
      background: #4a90e2;
      color: white;
      margin-left: auto;
    }

    .bot 
    {
      background: #e5edf5;
      color: #333;
      margin-right: auto;
    }

    /* Input area and styling */
    #inputArea 
    {
      padding: 10px;
      background: white;
      border-top: 1px solid #ddd;
      display: flex;
      gap: 10px;
    }

    textarea 
    {
      flex: 1;
      resize: none;
      height: 45px;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid #ccc;
      font-size: 14px;
    }

    textarea:focus 
    {
      outline: none;
      border-color: #4a90e2;
    }

    /* Send button styling */
    button 
    {
      width: 100px;
      background: #4a90e2;
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover 
    {
      background: #3b7cc4;
    }
  </style>
</head>

<body>
  <div class="chat-container">
    <div class="chat-header">Health Assistant Chat</div>

    <div class="session-bar">
      <div id="sessionInfo" class="session-info">Loading session...</div>
      <button id="logoutBtn" class="logout-btn" type="button">Logout</button>
    </div>

    <div class="chat-controls">
      <label for="roleSelect">Role:</label>
      <select id="roleSelect">
        <option value="patient">patient</option>
        <option value="doctor">doctor</option>
        <option value="insurance">insurance</option>
      </select>

      <label for="patientSelect">Patient:</label>
      <select id="patientSelect"></select>

      <label class="checkbox">
        <input type="checkbox" id="consentCheck" checked />
        Consent
      </label>
    </div>

    <div id="chatBox"></div>

    <div id="inputArea">
      <textarea id="userInput" placeholder="Ask something..."></textarea>
      <button onclick="sendMessage()">Send</button>
    </div>
  </div>

  <script>
    const chatContainerbox = document.getElementById("chatBox");
    const userInput = document.getElementById("userInput");
    const patientSelect = document.getElementById("patientSelect");
    const roleSelect = document.getElementById("roleSelect");
    const consentCheck = document.getElementById("consentCheck");
    const sessionInfo = document.getElementById("sessionInfo");
    const logoutBtn = document.getElementById("logoutBtn");

    // Session state
    let currentSession = null;

    // Patient label mapping for dropdown display
    const patientLabels = {
      patient_001: "Patient 001 - Maria Santos",
      patient_002: "Patient 002 - James O'Brien",
      patient_003: "Patient 003 - Priya Kapoor",
      patient_004: "Patient 004 - Robert Chen"
    };

    function addMessage(text, sender) {
      const msg = document.createElement("div");
      msg.classList.add("message", sender);
      msg.textContent = text;
      chatContainerbox.appendChild(msg);
      chatContainerbox.scrollTop = chatContainerbox.scrollHeight;
    }

    // Loads session from localStorage and lock UI to account permissions
    function loadSession() {
      const raw = localStorage.getItem("chatSession");

      if (!raw) {
        window.location.href = "/login.html";
        return;
      }

      try {
        currentSession = JSON.parse(raw);
      } catch (err) {
        localStorage.removeItem("chatSession");
        window.location.href = "/login.html";
        return;
      }

      sessionInfo.textContent = `Logged in as: ${currentSession.display_name} (${currentSession.role})`;

      // Role is no longer manually editable
      roleSelect.value = currentSession.role;
      roleSelect.disabled = true;

      // Patient choices are based on the logged-in account
      patientSelect.innerHTML = "";

      if (currentSession.role === "patient") {
        const opt = document.createElement("option");
        opt.value = currentSession.patient_id;
        opt.textContent = patientLabels[currentSession.patient_id] || currentSession.patient_id;
        patientSelect.appendChild(opt);
        patientSelect.value = currentSession.patient_id;
        patientSelect.disabled = true;
      } else {
        const allowed = currentSession.allowed_patients || [];
        allowed.forEach(pid => {
          const opt = document.createElement("option");
          opt.value = pid;
          opt.textContent = patientLabels[pid] || pid;
          patientSelect.appendChild(opt);
        });
        patientSelect.disabled = false;
      }
    }

    // Logout handler
    function logout() {
      localStorage.removeItem("chatSession");
      window.location.href = "/login.html";
    }

    async function getBotReply(userMessage) {
      try {
        const selectedPatient =
          currentSession.role === "patient"
            ? currentSession.patient_id
            : patientSelect.value;

        const response = await fetch("/api/chat", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "X-Session-Token": currentSession.session_token
          },
          body: JSON.stringify({
            message: userMessage,
            patient_id: selectedPatient,
            consent: consentCheck.checked
          })
        });

        const data = await response.json().catch(() => ({}));

        if (!response.ok) {
          console.error("API error:", response.status, data);
          return data.detail || data.error || `Server error (${response.status})`;
        }

        return data.reply || "(empty reply)";
      } catch (err) {
        console.error("Fetch failed:", err);
        return "Could not reach the backend. Is the server running?";
      }
    }

    async function sendMessage() {
      const text = userInput.value.trim();
      if (text === "") return;

      userInput.value = "";
      addMessage(text, "user");

      addMessage("...", "bot");
      const reply = await getBotReply(text);

      chatContainerbox.removeChild(chatContainerbox.lastChild);
      addMessage(reply, "bot");
    }

    userInput.addEventListener("keydown", function (event) {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    });

    // Reset chat banner when context-related controls change
    function resetChatBanner() {
      chatContainerbox.innerHTML = "";
      addMessage("Hello I am a health chatbot.", "bot");
    }

    patientSelect.addEventListener("change", resetChatBanner);
    consentCheck.addEventListener("change", resetChatBanner);
    logoutBtn.addEventListener("click", logout);

    // Initialize locked session state before showing chat
    loadSession();

    // Greeting
    resetChatBanner();
  </script>
</body>
</html>
